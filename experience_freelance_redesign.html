<style>
  .exp-section {
    padding: 2rem 0;
    font-family: var(--font-sans);
  }
  .section-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--color-text-secondary);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .section-title {
    font-size: 22px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin: 0 0 6px;
  }
  .section-sub {
    font-size: 14px;
    color: var(--color-text-secondary);
    margin: 0 0 2rem;
  }
  .timeline {
    position: relative;
    padding-left: 0;
  }
  .tl-item {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 0 20px;
    margin-bottom: 0;
  }
  .tl-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 18px;
  }
  .tl-date {
    font-size: 11px;
    font-weight: 500;
    color: var(--color-text-secondary);
    text-align: center;
    line-height: 1.3;
    white-space: nowrap;
  }
  .tl-line-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .tl-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #534ab7;
    margin: 6px 0 0;
    flex-shrink: 0;
  }
  .tl-dot.active {
    background: #1d9e75;
    box-shadow: 0 0 0 3px rgba(29, 158, 117, 0.18);
  }
  .tl-connector {
    width: 1.5px;
    flex: 1;
    background: var(--color-border-tertiary);
    min-height: 20px;
  }
  .tl-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 14px 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .tl-card:hover {
    border-color: var(--color-border-secondary);
  }
  .tl-card.open {
    border-color: #534ab7;
    border-width: 1px;
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .card-main {
    flex: 1;
  }
  .card-company {
    font-size: 15px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin: 0 0 2px;
  }
  .card-role {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin: 0 0 8px;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 20px;
  }
  .tag-purple {
    background: #eeedfe;
    color: #534ab7;
  }
  .tag-teal {
    background: #e1f5ee;
    color: #0f6e56;
  }
  .tag-blue {
    background: #e6f1fb;
    color: #185fa5;
  }
  .tag-amber {
    background: #faeeda;
    color: #854f0b;
  }
  .tag-coral {
    background: #faece7;
    color: #993c1d;
  }
  .tag-green {
    background: #eaf3de;
    color: #3b6d11;
  }
  .tag-gray {
    background: #f1efe8;
    color: #5f5e5a;
  }
  .badge-now {
    font-size: 10px;
    font-weight: 500;
    background: #e1f5ee;
    color: #0f6e56;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    align-self: flex-start;
    margin-top: 2px;
  }
  .card-details {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 0.5px solid var(--color-border-tertiary);
    display: none;
  }
  .card-details.open {
    display: block;
  }
  .card-details ul {
    margin: 0;
    padding-left: 16px;
  }
  .card-details li {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-bottom: 4px;
    line-height: 1.5;
  }
  .highlights {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .hl-card {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: 12px 14px;
  }
  .hl-num {
    font-size: 22px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin: 0 0 2px;
  }
  .hl-label {
    font-size: 12px;
    color: var(--color-text-secondary);
  }
  .chevron {
    font-size: 14px;
    color: var(--color-text-secondary);
    transition: transform 0.2s;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .chevron.open {
    transform: rotate(180deg);
  }
  @media (max-width: 480px) {
    .highlights {
      grid-template-columns: 1fr 1fr;
    }
    .tl-item {
      grid-template-columns: 70px 1fr;
    }
  }
</style>

<div class="exp-section">
  <h2 class="sr-only">Pengalaman kerja dan karier</h2>

  <p class="section-label">Karier</p>
  <h2 class="section-title">Pengalaman</h2>
  <p class="section-sub">
    Frontend-focused developer dengan pengalaman lintas industri — fintech,
    marketplace, hingga pemerintahan.
  </p>

  <div class="highlights">
    <div class="hl-card">
      <div class="hl-num">7+</div>
      <div class="hl-label">Pengalaman & organisasi</div>
    </div>
    <div class="hl-card">
      <div class="hl-num">60+</div>
      <div class="hl-label">API endpoint diintegrasikan</div>
    </div>
    <div class="hl-card">
      <div class="hl-num">2×</div>
      <div class="hl-label">Program MBKM selesai</div>
    </div>
  </div>

  <div class="timeline" id="timeline"></div>
</div>

<script>
  const data = [
    {
      company: 'Manifestasi Tech',
      role: 'Frontend Developer',
      date: 'Mar 2025 – Sekarang',
      active: true,
      tags: [
        { l: 'React / Next.js', c: 'purple' },
        { l: 'UI/UX Collab', c: 'teal' },
        { l: 'Accessible Design', c: 'blue' },
      ],
      details: [
        'Mengembangkan frontend berbagai proyek: website riset dosen, marketplace, dan landing page modern.',
        'Berkolaborasi lintas tim untuk menerjemahkan kebutuhan UI/UX menjadi komponen frontend yang bersih dan scalable.',
      ],
    },
    {
      company: 'Rapier Technology International',
      role: 'Frontend Developer',
      date: 'Feb – Mei 2025',
      tags: [
        { l: 'WMS', c: 'blue' },
        { l: '60+ API endpoints', c: 'purple' },
        { l: 'Client-facing', c: 'teal' },
      ],
      details: [
        'Berkontribusi pada pengembangan Warehouse Management System (WMS) dan platform Marketplace.',
        'Mengintegrasikan 60+ endpoint RESTful API dan menyelesaikan 30+ isu development.',
        'Mempresentasikan progres proyek langsung kepada klien dan stakeholder.',
      ],
    },
    {
      company: 'Campus Digital Indonesia',
      role: 'Fullstack Web Developer',
      date: 'Sep – Des 2024',
      tags: [
        { l: 'MBKM Batch 7', c: 'amber' },
        { l: 'CRM', c: 'blue' },
        { l: 'Fullstack', c: 'purple' },
      ],
      details: [
        'Program MBKM Kemdikbud Magang Bersertifikat batch 7.',
        'Mengembangkan sistem backend dan integrasi third-party API untuk CRM.',
        'Slicing frontend berbasis desain UI/UX yang responsif dan user-friendly.',
      ],
    },
    {
      company: 'Bank Indonesia – Jawa Tengah',
      role: 'Public Relation Intern',
      date: 'Jun – Jul 2024',
      tags: [
        { l: 'Web Dev', c: 'teal' },
        { l: 'Desain', c: 'coral' },
        { l: 'Pemerintahan', c: 'gray' },
      ],
      details: [
        'Membuat website registrasi intern mahasiswa sebagai final project.',
        "Mendesain game digital edukasi program 'Cinta Rupiah'.",
        'Mengelola dan mengintegrasikan data ke sistem terpusat Bank Indonesia.',
      ],
    },
    {
      company: 'Binar Academy',
      role: 'Fullstack Web Developer',
      date: 'Feb – Jun 2024',
      tags: [
        { l: 'MBKM Batch 6', c: 'amber' },
        { l: 'Express.js', c: 'green' },
        { l: 'React.js', c: 'blue' },
        { l: '🏆 Best Capstone', c: 'teal' },
      ],
      details: [
        'Program MBKM Kemdikbud Studi Independen Bersertifikat batch 6.',
        'Mengembangkan real-time chat app dan website booking tiket pesawat.',
        'Meraih penghargaan Best Final Capstone Fullstack Web Development MSIB batch 6.',
      ],
    },
    {
      company: 'HMTI Udinus',
      role: 'Pengurus Bidang Infokom',
      date: 'Apr 2022 – Mei 2024',
      tags: [
        { l: 'Leadership', c: 'purple' },
        { l: 'Event Organizer', c: 'coral' },
        { l: 'Konten Digital', c: 'teal' },
      ],
      details: [
        'Lead Content Creator Informatic Media, memimpin tim dan menjaga kualitas editorial.',
        'Lead Event Hi-Talk #4 bersama GDSC Udinus & Dicoding Indonesia.',
        'Aktif di 6 event nasional dan 2 event internal.',
      ],
    },
    {
      company: 'BNN Kota Tegal',
      role: 'Duta Anti Narkoba',
      date: 'Okt 2019 – Jun 2022',
      tags: [
        { l: 'Edukasi Publik', c: 'amber' },
        { l: 'Graphic Design', c: 'coral' },
        { l: 'Sosial', c: 'gray' },
      ],
      details: [
        'Mendukung program P4GN BNN Kota Tegal.',
        "Membantu deklarasi 'Desa Bersinar' di Kota Tegal.",
        'Mendesain grafis untuk acara-acara yang diselenggarakan.',
      ],
    },
  ];

  const tl = document.getElementById('timeline');

  data.forEach((exp, i) => {
    const isLast = i === data.length - 1;
    const item = document.createElement('div');
    item.className = 'tl-item';

    const tagsHtml = exp.tags
      .map((t) => `<span class="tag tag-${t.c}">${t.l}</span>`)
      .join('');
    const badgeHtml = exp.active ? `<span class="badge-now">Aktif</span>` : '';
    const detailsHtml = exp.details.map((d) => `<li>${d}</li>`).join('');

    item.innerHTML = `
    <div class="tl-left">
      <div class="tl-date">${exp.date.replace(' – ', '\n– ')}</div>
      <div class="tl-line-wrap">
        <div class="tl-dot ${exp.active ? 'active' : ''}"></div>
        ${!isLast ? '<div class="tl-connector"></div>' : ''}
      </div>
    </div>
    <div>
      <div class="tl-card" data-index="${i}">
        <div class="card-top">
          <div class="card-main">
            <p class="card-company">${exp.company}</p>
            <p class="card-role">${exp.role}</p>
            <div class="card-tags">${tagsHtml}</div>
          </div>
          ${badgeHtml}
          <i class="ti ti-chevron-down chevron" aria-hidden="true"></i>
        </div>
        <div class="card-details">
          <ul>${detailsHtml}</ul>
        </div>
      </div>
    </div>
  `;
    tl.appendChild(item);
  });

  tl.addEventListener('click', (e) => {
    const card = e.target.closest('.tl-card');
    if (!card) return;
    const details = card.querySelector('.card-details');
    const chevron = card.querySelector('.chevron');
    const isOpen = details.classList.contains('open');
    details.classList.toggle('open', !isOpen);
    card.classList.toggle('open', !isOpen);
    chevron.classList.toggle('open', !isOpen);
  });
</script>
